name: MRS Daily Update

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MRS update
        run: python update_data.py
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
          
      - name: Commit updated history
        run: |
          git config user.name  "MRS Bot"
          git config user.email "mrs-bot@epistruct.com"
          git add mrs_history.csv
          git diff --staged --quiet || git commit -m "MRS daily update $(date +'%Y-%m-%d')"
          git push
